<!DOCTYPE html>
<html>
<head>
    <title>Forge AI Assistant</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="app">

    <h1>Forge AI Assistant</h1>

    <div id="chat">
        <div class="message bot">
            Hey! I'm your Forge Digital assistant. What do you need help with?
        </div>
    </div>


    <div class="input-area">

        <input 
        id="userInput"
        placeholder="Ask me anything..."
        >

        <button onclick="sendMessage()">
        Send
        </button>

    </div>


</div>


<script src="script.js"></script>

</body>
</html>
